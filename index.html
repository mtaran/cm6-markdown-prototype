<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>CM6 Markdown Editor</title>

  <!--
    Import map dedupes @codemirror/* and @lezer/* across packages so a single
    @codemirror/state instance is shared (mixing independently-pinned esm.sh
    builds otherwise throws "multiple instances of @codemirror/state").
    Leaf deps (style-mod, crelt, ...) are left bundled per-package — harmless.
  -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.26.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.1?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.6.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.6?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.16.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.7.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@lezer/common": "https://esm.sh/@lezer/common@1.2.1",
      "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.0?external=@lezer/common",
      "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.1?external=@lezer/common",
      "@lezer/markdown": "https://esm.sh/@lezer/markdown@1.3.0?external=@lezer/common,@lezer/highlight",
      "codemirror": "https://esm.sh/codemirror@6.0.1?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.3.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint,@lezer/common,@lezer/highlight,@lezer/lr,@lezer/markdown",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2?external=@codemirror/state,@codemirror/view,@codemirror/language"
    }
  }
  </script>

  <style>
    :root {
      /* Light palette (default) */
      --bg: #ffffff;
      --bg-elev: #f5f6f8;
      --border: #e2e4e9;
      --fg: #1f2328;
      --fg-muted: #636c76;
      --accent: #3b6df0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --bg-elev: #161b22;
        --border: #2a3038;
        --fg: #e6edf3;
        --fg-muted: #9aa5b1;
        --accent: #6e9bff;
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      font: 14px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    header h1 { font-size: 14px; font-weight: 600; margin: 0; }
    header .meta { color: var(--fg-muted); font-size: 12px; font-weight: 400; }

    /* Mode indicator (top-right) */
    .mode {
      margin-left: auto;
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .08em;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--fg-muted);
      user-select: none;
    }
    .mode[data-mode="insert"] { background: #fef9ef; color: #8a6d3b; border-color: #e7dcc3; }
    @media (prefers-color-scheme: dark) {
      .mode[data-mode="insert"] { background: #2b2620; color: #d9c79b; border-color: #4a4230; }
    }

    main { flex: 1 1 auto; min-height: 0; }
    .cm-editor { height: 100%; }
    .cm-editor.cm-focused { outline: none; }
    .cm-scroller { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }

    /* Insert mode: warm editor background (254 249 239), warm dark equivalent. */
    html.insert-mode .cm-editor,
    html.insert-mode .cm-editor .cm-gutters { background-color: #fef9ef !important; }
    @media (prefers-color-scheme: dark) {
      html.insert-mode .cm-editor,
      html.insert-mode .cm-editor .cm-gutters { background-color: #2b2620 !important; }
    }

    /* Widget highlights: a colored background on the text, plus a small type
       label dropped into the gap below the text. Each widget type (entity,
       problem, action, ambig, scale, req) shares this layout and differs only
       in color and the label's text (set per-type below).
       The span is inline-block with a margin-bottom: a line box's height counts
       the inline-block's *margin box*, so the extra space lands only BELOW the
       text on the row(s) the highlight sits on (a tall line-height would add it
       symmetrically, above and below). Margin is transparent, so the color stays
       tight to the text; the label drops into the margin space. Only the
       wrapped row(s) the highlight actually touches grow. */
    .cm-hl {
      border-radius: 2px;
      position: relative;
      display: inline-block;
      line-height: 1.35;
      margin-bottom: 0.9rem;
    }
    .cm-hl::after {
      position: absolute;
      left: 0;
      /* Sit just below the text box (top: 100%) in the margin space below. */
      top: 100%;
      margin-top: 0.05rem;
      font-size: 0.72rem;
      line-height: 1.1;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      letter-spacing: .04em;
      padding: 0 4px;
      border-radius: 2px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Per-type colors (light mode): a bright fill on the text and a paler
       label chip beneath it. */
    .cm-hl-entity  { background-color: #ffd54a; }
    .cm-hl-entity::after  { content: "entity";  background-color: #fff0a8; color: #6b5300; }
    .cm-hl-problem { background-color: #ffb3b3; }
    .cm-hl-problem::after { content: "problem"; background-color: #ffd9d9; color: #8a1f1f; }
    .cm-hl-action  { background-color: #a9c9ff; }
    .cm-hl-action::after  { content: "action";  background-color: #d6e6ff; color: #1f3d8a; }
    .cm-hl-ambig   { background-color: #d3d3d8; }
    .cm-hl-ambig::after   { content: "ambig";   background-color: #e8e8ec; color: #4a4a52; }
    .cm-hl-scale   { background-color: #d9b3ff; }
    .cm-hl-scale::after   { content: "scale";   background-color: #ecd9ff; color: #5a2a8a; }
    .cm-hl-req     { background-color: #a9e6b8; }
    .cm-hl-req::after     { content: "req";     background-color: #d6f5de; color: #1f6b35; }

    @media (prefers-color-scheme: dark) {
      /* Darker, muted fills with a dark text color for contrast. */
      .cm-hl-entity  { background-color: #b8902a; color: #1c1400; }
      .cm-hl-entity::after  { background-color: #6b5300; color: #ffe9a8; }
      .cm-hl-problem { background-color: #c96a6a; color: #1c0000; }
      .cm-hl-problem::after { background-color: #6b2a2a; color: #ffd9d9; }
      .cm-hl-action  { background-color: #6a8ec9; color: #00081c; }
      .cm-hl-action::after  { background-color: #2a3d6b; color: #d6e6ff; }
      .cm-hl-ambig   { background-color: #9a9aa2; color: #16161a; }
      .cm-hl-ambig::after   { background-color: #4a4a52; color: #e8e8ec; }
      .cm-hl-scale   { background-color: #9a6ac9; color: #0e001c; }
      .cm-hl-scale::after   { background-color: #4a2a6b; color: #ecd9ff; }
      .cm-hl-req     { background-color: #6ac98a; color: #001c0a; }
      .cm-hl-req::after     { background-color: #2a6b3d; color: #d6f5de; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Markdown Editor <span class="meta">· CodeMirror 6</span></h1>
    <div class="mode" id="mode" data-mode="command" title="i = insert · Esc = command">COMMAND</div>
  </header>
  <main id="editor"></main>

  <script type="module">
    // basicSetup unpacked manually so we can drop rectangularSelection +
    // crosshairCursor, which would otherwise claim the Alt modifier.
    import {
      EditorView, keymap, lineNumbers, highlightActiveLineGutter,
      highlightSpecialChars, drawSelection, dropCursor, highlightActiveLine,
      Decoration,
    } from "@codemirror/view";
    import { EditorState, EditorSelection, Compartment, Prec, Transaction, StateField, StateEffect } from "@codemirror/state";
    import {
      foldGutter, indentOnInput, syntaxHighlighting, defaultHighlightStyle,
      bracketMatching, foldKeymap,
    } from "@codemirror/language";
    import { history, defaultKeymap, historyKeymap, indentWithTab, cursorGroupLeft, cursorGroupRight, selectGroupLeft, selectGroupRight } from "@codemirror/commands";
    import { highlightSelectionMatches, searchKeymap } from "@codemirror/search";
    import { autocompletion, closeBrackets, closeBracketsKeymap, completionKeymap } from "@codemirror/autocomplete";
    import { lintKeymap } from "@codemirror/lint";
    import { markdown, markdownLanguage } from "@codemirror/lang-markdown";
    import { oneDark } from "@codemirror/theme-one-dark";

    // Equivalent to codemirror's basicSetup, minus rectangularSelection/crosshairCursor.
    const editorSetup = [
      lineNumbers(),
      highlightActiveLineGutter(),
      highlightSpecialChars(),
      history(),
      foldGutter(),
      drawSelection(),
      dropCursor(),
      EditorState.allowMultipleSelections.of(true),
      indentOnInput(),
      syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
      bracketMatching(),
      closeBrackets(),
      autocompletion(),
      highlightActiveLine(),
      highlightSelectionMatches({ wholeWords: true }),
      // Alt-click adds/removes cursors (Cmd-click kept working too).
      EditorView.clickAddsSelectionRange.of(e => e.altKey || e.metaKey),
      keymap.of([
        ...closeBracketsKeymap,
        ...defaultKeymap,
        ...searchKeymap,
        ...historyKeymap,
        ...foldKeymap,
        ...completionKeymap,
        ...lintKeymap,
        // Tab indents (Shift-Tab dedents) instead of moving focus out of the editor.
        indentWithTab,
      ]),
    ];

    const defaultDoc = `# Markdown Source Editor

A **CodeMirror 6** prototype with responsive light/dark mode.

## Features
- Syntax highlighting for Markdown
- Light / Dark / Auto theme switching
- Auto mode follows your OS \`prefers-color-scheme\`

\`\`\`js
function hello(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

> Try switching your system theme while the toggle is on **Auto**.

1. First item
2. Second item
3. Third item

| Col A | Col B |
| ----- | ----- |
| 1     | 2     |

[A link](https://codemirror.net) and ~~strikethrough~~.
`;

    // --- Persistence -----------------------------------------------------
    // Restore the doc from localStorage on load; fall back to the demo doc.
    const STORAGE_KEY = "cm6-markdown-doc";
    const HIGHLIGHTS_KEY = "cm6-markdown-highlights";
    const saved = localStorage.getItem(STORAGE_KEY);
    const doc = saved !== null ? saved : defaultDoc;

    // Saved widget highlights as [from, to, type] triples (positions into the
    // doc). Legacy [from, to] pairs (pre-multi-type) are read as "entity".
    // The highlightField (defined below) restores them in its create().
    let savedHighlights = [];
    try {
      const raw = localStorage.getItem(HIGHLIGHTS_KEY);
      if (raw) savedHighlights = JSON.parse(raw);
    } catch { savedHighlights = []; }

    // Read the current highlight ranges out of the field as [from, to, type].
    const serializeHighlights = (state) => {
      const ranges = [];
      for (let i = state.field(highlightField).iter(); i.value; i.next()) {
        ranges.push([i.from, i.to, markType.get(i.value) || "entity"]);
      }
      return ranges;
    };

    const persist = EditorView.updateListener.of((update) => {
      if (update.docChanged) {
        localStorage.setItem(STORAGE_KEY, update.state.doc.toString());
      }
      // The field returns a new DecorationSet whenever highlights are added,
      // removed, or shifted by an edit; persist on that identity change.
      if (update.startState.field(highlightField) !== update.state.field(highlightField)) {
        localStorage.setItem(HIGHLIGHTS_KEY, JSON.stringify(serializeHighlights(update.state)));
      }
    });

    const themeConf = new Compartment();
    const mql = window.matchMedia("(prefers-color-scheme: dark)");

    // Light theme tweaks so CM blends with the page chrome.
    const lightTheme = EditorView.theme({
      "&": { backgroundColor: "var(--bg)", color: "var(--fg)" },
      ".cm-gutters": { backgroundColor: "var(--bg-elev)", color: "var(--fg-muted)", border: "none" },
      ".cm-activeLine": { backgroundColor: "rgba(0,0,0,0.03)" },
      ".cm-activeLineGutter": { backgroundColor: "rgba(0,0,0,0.05)" },
      ".cm-selectionBackground, &.cm-focused .cm-selectionBackground": { backgroundColor: "#d7e3ff" },
    }, { dark: false });

    const themeExtension = (dark) => (dark ? oneDark : lightTheme);

    // --- Command / Insert modes -----------------------------------------
    // Command mode (default): read-only, word-wise navigation, and the word
    // under the cursor is selected (so other occurrences get highlighted).
    // Insert mode (press i to enter, Esc to leave): normal editing.
    const modeConf = new Compartment();
    const modeEl = document.getElementById("mode");

    const isWordChar = (ch) => /[\p{L}\p{N}_]/u.test(ch);

    // Word range after `from` (skips the current word, then the gap).
    function nextWordRange(state, from) {
      const text = state.doc.toString(), n = text.length;
      let i = from;
      while (i < n && isWordChar(text[i])) i++;
      while (i < n && !isWordChar(text[i])) i++;
      if (i >= n) return null;
      const start = i;
      while (i < n && isWordChar(text[i])) i++;
      return EditorSelection.range(start, i);
    }
    // Word range before `from`.
    function prevWordRange(state, from) {
      const text = state.doc.toString();
      let i = from;
      while (i > 0 && isWordChar(text[i - 1])) i--;
      while (i > 0 && !isWordChar(text[i - 1])) i--;
      if (i <= 0) return null;
      const end = i;
      while (i > 0 && isWordChar(text[i - 1])) i--;
      return EditorSelection.range(i, end);
    }
    const selectNextWord = (v) => {
      const w = nextWordRange(v.state, v.state.selection.main.to);
      if (!w) return false;
      v.dispatch({ selection: w, scrollIntoView: true, userEvent: "select" });
      return true;
    };
    const selectPrevWord = (v) => {
      const w = prevWordRange(v.state, v.state.selection.main.from);
      if (!w) return false;
      v.dispatch({ selection: w, scrollIntoView: true, userEvent: "select" });
      return true;
    };
    // Move the selection one visual line up/down, then snap to the word nearest
    // the cursor's column on the new line (a bare caret if it lands on blank
    // space). Drives Up/Down in command mode.
    function selectWordVertical(v, forward) {
      const head = v.state.selection.main.head;
      const moved = v.moveVertically(EditorSelection.cursor(head), forward);
      const w = v.state.wordAt(moved.head);
      v.dispatch({
        selection: w ? EditorSelection.range(w.from, w.to) : EditorSelection.cursor(moved.head),
        scrollIntoView: true,
        userEvent: "select",
      });
      return true;
    }
    const selectWordUp = (v) => selectWordVertical(v, false);
    const selectWordDown = (v) => selectWordVertical(v, true);

    // --- Shift+arrow: grow the word selection outward --------------------
    // Word selections keep both edges on word boundaries, so Shift grows the
    // edge in the arrow's direction — by a whole word (Left/Right) or to the
    // word nearest the column one line away (Up/Down). Growing outward (rather
    // than moving a single head) keeps Shift+Left and Shift+Right symmetric and
    // avoids collapsing the freshly selected word, which a plain head-move does.
    const extendWordLeft = (v) => {
      const main = v.state.selection.main;
      const w = prevWordRange(v.state, main.from);
      const from = w ? w.from : 0;
      if (from === main.from) return true;
      v.dispatch({ selection: EditorSelection.range(from, main.to), scrollIntoView: true, userEvent: "select" });
      return true;
    };
    const extendWordRight = (v) => {
      const main = v.state.selection.main;
      const w = nextWordRange(v.state, main.to);
      const to = w ? w.to : v.state.doc.length;
      if (to === main.to) return true;
      v.dispatch({ selection: EditorSelection.range(main.from, to), scrollIntoView: true, userEvent: "select" });
      return true;
    };
    const extendLineUp = (v) => {
      const main = v.state.selection.main;
      const moved = v.moveVertically(EditorSelection.cursor(main.from), false);
      const w = v.state.wordAt(moved.head);
      const from = w ? w.from : moved.head;
      if (from >= main.from) return true;
      v.dispatch({ selection: EditorSelection.range(from, main.to), scrollIntoView: true, userEvent: "select" });
      return true;
    };
    const extendLineDown = (v) => {
      const main = v.state.selection.main;
      const moved = v.moveVertically(EditorSelection.cursor(main.to), true);
      const w = v.state.wordAt(moved.head);
      const to = w ? w.to : moved.head;
      if (to <= main.to) return true;
      v.dispatch({ selection: EditorSelection.range(main.from, to), scrollIntoView: true, userEvent: "select" });
      return true;
    };

    // In command mode, snap any bare cursor (e.g. from a click or alt-click)
    // to the whole word at that position so it reads as a word selection.
    const snapToWords = EditorState.transactionFilter.of((tr) => {
      if (!tr.selection) return tr;
      let changed = false;
      const ranges = tr.newSelection.ranges.map((r) => {
        if (!r.empty) return r;
        const w = tr.state.wordAt(r.head);
        if (!w) return r;
        changed = true;
        return EditorSelection.range(w.from, w.to);
      });
      if (!changed) return tr;
      const ev = tr.annotation(Transaction.userEvent);
      return {
        changes: tr.changes,
        selection: EditorSelection.create(ranges, tr.newSelection.mainIndex),
        effects: tr.effects,
        scrollIntoView: tr.scrollIntoView,
        annotations: ev ? Transaction.userEvent.of(ev) : undefined,
      };
    });

    // --- Widget highlights ----------------------------------------------
    // A persistent decoration (kept in a StateField so it maps through edits).
    // Each highlight is a colored mark on its text; its CSS makes the span an
    // inline-block with a margin-bottom so the row it sits on has room below,
    // where a per-type label is dropped.
    //
    // The available widget types. `cmdKey` toggles the type in command mode
    // (read-only, so a bare letter is free); `insKey` toggles it in insert mode
    // (where letters type text, so a modifier is required).
    const WIDGET_TYPES = [
      { id: "entity",  cmdKey: "e", insKey: "Mod-e" },
      { id: "problem", cmdKey: "p", insKey: "Mod-p" },
      { id: "action",  cmdKey: "a", insKey: "Mod-a" },
      { id: "ambig",   cmdKey: "?", insKey: "Mod-?" },
      { id: "scale",   cmdKey: "s", insKey: "Mod-s" },
      { id: "req",     cmdKey: "r", insKey: "Mod-r" },
    ];
    // One shared mark per type (reused so its identity maps back to a type), and
    // a reverse lookup from a mark to its type id for serialization.
    const widgetMarks = new Map();
    const markType = new Map();
    for (const t of WIDGET_TYPES) {
      const mark = Decoration.mark({ class: `cm-hl cm-hl-${t.id}` });
      widgetMarks.set(t.id, mark);
      markType.set(mark, t.id);
    }
    const markFor = (type) => widgetMarks.get(type) || widgetMarks.get("entity");

    // addHighlights carries { type, ranges }; removeHighlights an array of ranges.
    const addHighlights = StateEffect.define();
    const removeHighlights = StateEffect.define();

    // Two ranges overlap when each starts before the other ends.
    const overlaps = (aFrom, aTo, bFrom, bTo) => aFrom < bTo && bFrom < aTo;

    const highlightField = StateField.define({
      // Restore highlights saved in localStorage, dropping any range that no
      // longer fits the (possibly externally changed) document.
      create(state) {
        const n = state.doc.length;
        const adds = (Array.isArray(savedHighlights) ? savedHighlights : [])
          .filter((r) => Array.isArray(r) && Number.isInteger(r[0]) &&
            Number.isInteger(r[1]) && r[0] < r[1] && r[0] >= 0 && r[1] <= n)
          .map(([from, to, type]) => markFor(type).range(from, to));
        return Decoration.none.update({ add: adds, sort: true });
      },
      update(deco, tr) {
        deco = deco.map(tr.changes);
        for (const e of tr.effects) {
          if (e.is(removeHighlights)) {
            const rs = e.value;
            deco = deco.update({
              filter: (from, to) => !rs.some((r) => overlaps(from, to, r.from, r.to)),
            });
          } else if (e.is(addHighlights)) {
            const mark = markFor(e.value.type);
            const adds = e.value.ranges
              .filter(({ from, to }) => from < to)
              .map(({ from, to }) => mark.range(from, to));
            deco = deco.update({ add: adds, sort: true });
          }
        }
        return deco;
      },
      provide: (f) => EditorView.decorations.from(f),
    });

    // The type id of the first highlight overlapping this range, or null.
    const typeAt = (state, r) => {
      let id = null;
      state.field(highlightField).between(r.from, r.to, (from, to, value) => {
        id = markType.get(value) || "entity";
        return false;
      });
      return id;
    };
    // Does any existing highlight overlap this range?
    const rangeHighlighted = (state, r) => typeAt(state, r) !== null;

    // Target ranges for the gesture: the current selection(s) as-is in command
    // mode; in insert mode each range is grown to whole-word boundaries so a
    // bare caret targets the word it sits on.
    const selectionTargets = (state) =>
      state.selection.ranges
        .filter((r) => !r.empty)
        .map((r) => ({ from: r.from, to: r.to }));
    const wordTargets = (state) => {
      const ranges = [];
      for (const r of state.selection.ranges) {
        let from = r.from, to = r.to;
        const wa = state.wordAt(from);
        const wb = state.wordAt(to);
        if (wa) from = Math.min(from, wa.from);
        if (wb) to = Math.max(to, wb.to);
        if (from < to) ranges.push({ from, to });
      }
      return ranges;
    };

    // Toggle a widget type over the targets. A target already carrying this
    // type is cleared; one carrying a different type is replaced; an unmarked
    // one gets the type added. (remove runs before add so a replacement lands.)
    const toggle = (v, targets, type) => {
      if (!targets.length) return false;
      const add = [], remove = [];
      for (const r of targets) {
        const cur = typeAt(v.state, r);
        if (cur === type) { remove.push(r); }       // same type -> clear
        else if (cur) { remove.push(r); add.push(r); } // other type -> replace
        else { add.push(r); }                       // unmarked -> add
      }
      const effects = [];
      if (remove.length) effects.push(removeHighlights.of(remove));
      if (add.length) effects.push(addHighlights.of({ type, ranges: add }));
      v.dispatch({ effects });
      return true;
    };
    // Remove-only (Backspace): drop any highlight overlapping a target. Returns
    // false when there's nothing to remove so the key falls through to normal
    // deletion.
    const unhighlight = (v, targets) => {
      const remove = targets.filter((r) => rangeHighlighted(v.state, r));
      if (!remove.length) return false;
      v.dispatch({ effects: removeHighlights.of(remove) });
      return true;
    };

    const unhighlightSelections = (v) => unhighlight(v, selectionTargets(v.state));
    const unhighlightWordsAtCursor = (v) => unhighlight(v, wordTargets(v.state));

    // Per-type keymap entries: command mode toggles over the selection(s);
    // insert mode toggles over the word(s) at the cursor. Command mode binds
    // both the bare key and the modifier variant (matching the insert binding).
    const commandHighlightKeys = WIDGET_TYPES.flatMap((t) => {
      const run = (v) => toggle(v, selectionTargets(v.state), t.id);
      return [{ key: t.cmdKey, run }, { key: t.insKey, run }];
    });
    const insertHighlightKeys = WIDGET_TYPES.map((t) => ({
      key: t.insKey,
      run: (v) => toggle(v, wordTargets(v.state), t.id),
    }));

    function enterInsert() { setMode("insert"); return true; }
    function enterCommand() { setMode("command"); return true; }

    const commandExtensions = [
      EditorState.readOnly.of(true),
      snapToWords,
      Prec.high(keymap.of([
        // Every horizontal arrow combo (plain / Alt / Cmd) moves the selection
        // by word; every vertical combo moves the word selection between lines.
        // Adding Shift to any of them grows the selection outward — by a word
        // (Left/Right) or a line (Up/Down). Binding all three modifier variants
        // to the same commands keeps the whole direction+modifier matrix
        // coherent (and overrides CodeMirror's group-step / line-boundary /
        // doc-start-end defaults).
        { key: "ArrowLeft", run: selectPrevWord, shift: extendWordLeft },
        { key: "Alt-ArrowLeft", run: selectPrevWord, shift: extendWordLeft },
        { key: "Mod-ArrowLeft", run: selectPrevWord, shift: extendWordLeft },
        { key: "ArrowRight", run: selectNextWord, shift: extendWordRight },
        { key: "Alt-ArrowRight", run: selectNextWord, shift: extendWordRight },
        { key: "Mod-ArrowRight", run: selectNextWord, shift: extendWordRight },
        { key: "ArrowUp", run: selectWordUp, shift: extendLineUp },
        { key: "Alt-ArrowUp", run: selectWordUp, shift: extendLineUp },
        { key: "Mod-ArrowUp", run: selectWordUp, shift: extendLineUp },
        { key: "ArrowDown", run: selectWordDown, shift: extendLineDown },
        { key: "Alt-ArrowDown", run: selectWordDown, shift: extendLineDown },
        { key: "Mod-ArrowDown", run: selectWordDown, shift: extendLineDown },
        // Each widget type's key (e/p/a/?/s/r, or its Cmd+ variant) toggles
        // that widget on the current selection(s) — adds it, replaces a
        // different type, or removes it if already that type.
        ...commandHighlightKeys,
        // Backspace / Cmd+Backspace remove the highlight on the selection(s).
        { key: "Backspace", run: unhighlightSelections },
        { key: "Mod-Backspace", run: unhighlightSelections },
        { key: "i", run: enterInsert },
        // Capture Tab (read-only mode can't indent) so it stays in the editor
        // rather than moving focus out.
        { key: "Tab", run: () => true, shift: () => true },
      ])),
    ];
    const insertExtensions = [
      Prec.high(keymap.of([
        { key: "Escape", run: enterCommand },
        // Cmd+<type key> toggles that widget on the word(s) the cursor is on
        // (adds, replaces a different type, or removes if already that type).
        // A bare letter would type text here, so a modifier is required. (Alt+e
        // is a dead key on macOS — it starts an accent sequence — so Alt is
        // unusable; Cmd it is.)
        ...insertHighlightKeys,
        // Backspace / Cmd+Backspace remove the highlight on the word at the
        // cursor when present; otherwise they fall through to normal deletion.
        { key: "Backspace", run: unhighlightWordsAtCursor },
        { key: "Mod-Backspace", run: unhighlightWordsAtCursor },
        // Cmd+Left/Right move by word (matching Alt+Left/Right) instead of the
        // default jump to line start/end; Shift extends the selection.
        { key: "Mod-ArrowLeft", run: cursorGroupLeft, shift: selectGroupLeft },
        { key: "Mod-ArrowRight", run: cursorGroupRight, shift: selectGroupRight },
      ])),
    ];

    let mode = "command";
    function setMode(next) {
      mode = next;
      const isInsert = mode === "insert";
      modeEl.textContent = isInsert ? "INSERT" : "COMMAND";
      modeEl.dataset.mode = mode;
      document.documentElement.classList.toggle("insert-mode", isInsert);
      const sel = view.state.selection;
      // 1) swap the mode extensions; 2) (re)place every cursor under the new
      // config — keep each range as-is for insert (so a command-mode word
      // selection carries over and stays selected, ready to replace or edit),
      // snap each to the word for command. Preserve all ranges so multi-cursor
      // survives the switch (e.g. Alt/Cmd-click cursors added in command mode).
      view.dispatch({ effects: modeConf.reconfigure(isInsert ? insertExtensions : commandExtensions) });
      view.dispatch({
        selection: EditorSelection.create(
          sel.ranges.map((r) => isInsert ? r : EditorSelection.cursor(r.head)),
          sel.mainIndex
        ),
      });
      view.focus();
    }

    const view = new EditorView({
      state: EditorState.create({
        doc,
        extensions: [
          editorSetup,
          EditorView.lineWrapping,
          markdown({ base: markdownLanguage }),
          themeConf.of(themeExtension(mql.matches)),
          modeConf.of(commandExtensions),
          highlightField,
          persist,
        ],
      }),
      parent: document.getElementById("editor"),
    });

    // Theme follows the OS color scheme; swap the editor theme when it changes.
    mql.addEventListener("change", () => {
      view.dispatch({ effects: themeConf.reconfigure(themeExtension(mql.matches)) });
    });

    // Start command mode with the first word selected.
    selectNextWord(view);
    view.focus();
  </script>
</body>
</html>
